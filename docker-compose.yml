services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: homenet
      POSTGRES_PASSWORD: homenet
      POSTGRES_DB: homenet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homenet"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "55433:5432"


  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "56379:6379"


  kafka:
    image: apache/kafka:4.0.2
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    ports:
      - "59092:9092"


  clamav:
    image: clamav/clamav:stable
    volumes:
      - clamav_data:/var/lib/clamav
    ports:
      - "53310:3310"


  livekit:
    image: livekit/livekit-server:latest
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey-change-me}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret-change-me}
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./ops/livekit.yaml:/etc/livekit.yaml:ro

  api:
    build: .
    command: ["npm", "run", "start"]
    env_file:
      - path: .env.production.example
        required: false
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      clamav:
        condition: service_started
      livekit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - homenet_storage:/var/lib/homenet/storage

  worker:
    build: .
    command: ["npm", "run", "worker"]
    env_file:
      - path: .env.production.example
        required: false
      - path: .env
        required: false
    depends_on:
      api:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      clamav:
        condition: service_started
    volumes:
      - homenet_storage:/var/lib/homenet/storage

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    volumes:
      - ./ops/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/certs:/etc/nginx/certs:ro
      - homenet_storage:/var/lib/homenet/storage:ro

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  clamav_data:
  homenet_storage:
